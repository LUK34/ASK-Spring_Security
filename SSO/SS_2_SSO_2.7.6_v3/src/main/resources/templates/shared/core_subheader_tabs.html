<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="core_subheader_tabs">

  <!-- =========================
       SUB HEADER (CENTER TABS)
       ========================= -->
  <div class="kng-subheader" dir="ltr" id="kngSubHeader">

  
  
    <ul class="kng-sub-tabs">

      <li class=" dept-tab active">
        <a th:href="@{/department}">
          <i class="fa fa-sitemap"></i>
          Department
          <span class="kng-badge">5</span>
        </a>
      </li>

      <li>
        <a th:href="@{/dentist}">
          <i class="fa fa-user-md"></i>
          Dentist
          <span class="kng-badge">1</span>
        </a>
      </li>

      <li>
        <a th:href="@{/medicine}">
          <i class="fa fa-medkit"></i>
          Medicine
          <span class="kng-badge">2</span>
        </a>
      </li>
      
      <li>
        <a th:href="@{/blood}">
          <i class="fa fa-tint"></i>
          Blood
          <span class="kng-badge">3</span>
        </a>
      </li>

      <li>
        <a th:href="@{/appointments}">
          <i class="fa fa-calendar-check-o"></i>
          Appointments
          <span class="kng-badge">0</span>
        </a>
      </li>

      <li>
        <a th:href="@{/notifications}">
          <i class="fa fa-bell"></i>
          Notifications
          <span class="kng-badge">6</span>
        </a>
      </li>

    </ul>
  </div>

  <!-- =========================
       STYLES (PLAIN & SAFE)
       ========================= -->
  <style>
  .kng-subheader{
    width: 100%;
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    padding: 8px 0;
  }

.kng-sub-tabs{
  list-style: none;
  margin: 0;
  padding: 0 12px;

  position: relative;          /* needed for absolute child */
  display: flex;
  justify-content: center;     /* all remaining tabs stay center */
  align-items: center;
  gap: 18px;
}

/* Department pinned to left corner */
.kng-sub-tabs li.dept-tab{
  position: absolute;
  left: 12px;                 /* same as ul padding */
  top: 50%;
  transform: translateY(-50%);
}


  .kng-sub-tabs li a{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    font-weight: 700;
    color: #333;
    text-decoration: none;
    border-radius: 4px;
  }

  .kng-sub-tabs li a:hover{ background: #f5f5f5; }
  .kng-sub-tabs li.active a{ background: #f0f0f0; color:#111; }

  .kng-badge{
    background: #d9d9d9;
    color: #111;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 10px;
    line-height: 1;
  }

    /* small screen safety */
    @media (max-width: 900px){
      .kng-sub-tabs{
        overflow-x: auto;
        justify-content: flex-start;
        padding: 0 10px;
      }
    }
  </style>

  <!-- =========================
       ACTIVE TAB SWITCH (UI)
       ========================= -->
  <script>
    (function(){
      var tabs = document.querySelectorAll('.kng-sub-tabs li');
      tabs.forEach(function(li){
        li.addEventListener('click', function(){
          tabs.forEach(t => t.classList.remove('active'));
          this.classList.add('active');
        });
      });
    })();
  </script>

</th:block>
</html>
