  <div class="header-left" dir="ltr"> <!-- Force left-to-right order -->

    <!-- Sign Out -->

    <!-- Rank + Name -->
    <div class="header-user">
    &nbsp;
      <span class="username"
            th:utext="${currentLang == 'ar' ? hrFamilyDto_list.get(0).designation : hrFamilyDto_list.get(0).designation}">

       /
      </span>&nbsp;

           onerror="this.onerror=null; this.src='./kng/legacy/imgs/avatar5.png';"
           alt="User Photo">
    </div>&nbsp;

    <!-- Language -->
     
    <div class="lang-select">
      <label for="langSelect"><i class="fa fa-language"></i></label>&nbsp;&nbsp;
      <select id="langSelect" onchange="window.location.href=this.value;">
        <option value="#">Lang</option>
        <option th:value="${urlWithEnglish}" th:selected="${currentLang == 'en'}">English</option>
        <option th:value="${urlWithArabic}" th:selected="${currentLang == 'ar'}  or ${currentLang} == null or ${currentLang} == '' ">عربي</option>
      </select>
    </div>&nbsp;&nbsp;
    
    <!-- Time + Date -->
    <div class="header-datetime">

      <span id="kngDate">-- --- ----</span>
    </div>&nbsp;&nbsp;
